# Allure配置文件
allure.results.directory=reports/allure-results
allure.link.mylink.pattern=https://example.com/testcase/{}/
allure.link.issue.pattern=https://example.com/issue/{}
allure.link.tms.pattern=https://example.com/tms/{}

# 环境信息
allure.environment.browser=chromium
allure.environment.headless=false
allure.environment.base_url=https://dify-enterprise.example.com
allure.environment.timeout=30000

# 报告配置
allure.report.title=Dify企业版登录测试报告
allure.report.description=企业版登录功能的自动化测试报告
